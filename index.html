<head>

<style>
  :root{
    --primary:#2563eb; --primary-dark:#1d4ed8; --bg:#f4f6fb; --card:#ffffff;
    --border:#e2e8f0; --text:#1e293b; --muted:#64748b;
    --good:#16a34a; --khaC:#2563eb; --dat:#d97706; --bad:#dc2626;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}

  header .sub{font-size:12px;opacity:.85;margin-top:2px;}
  .class-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select, input, textarea, button{font-family:inherit;font-size:14px;}
  select, input[type=text], input[type=number], input[type=date]{
    padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);

  header select option{color:#000;}

  button:hover{filter:brightness(0.97);}
  button.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
  button.primary:hover{background:var(--primary-dark);}
  button.danger{color:var(--bad);border-color:#fecaca;}
  button.ghost{background:transparent;border-color:transparent;color:#fff;}
  button.small{padding:4px 9px;font-size:12px;border-radius:6px;}
  nav.tabs{display:flex;gap:4px;background:#fff;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto;}
  nav.tabs button{border:none;background:transparent;border-radius:0;padding:14px 16px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabs button.active{color:var(--primary);border-bottom-color:var(--primary);}
  main{padding:20px 24px;max-width:1400px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
  .card h2{margin:0 0 12px;font-size:16px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .row.between{justify-content:space-between;}
  .muted{color:var(--muted);font-size:13px;}

  th,td{border:1px solid var(--border);padding:6px 8px;text-align:center;}
  th{background:#f1f5f9;font-weight:600;}
  td.name-cell, th.name-cell{text-align:left;min-width:150px;}
  table input{width:56px;padding:4px;border:1px solid #dbe3ee;border-radius:6px;text-align:center;}
  table input:focus{outline:2px solid var(--primary);}
  .tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;}

  .tag.kha{background:var(--khaC);}
  .tag.dat{background:var(--dat);}
  .tag.chuadat{background:var(--bad);}
  .tag.none{background:#94a3b8;}
  .empty{padding:40px;text-align:center;color:var(--muted);}
  .empty .big{font-size:40px;margin-bottom:10px;}
  .list-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:#fafcff;}
  .list-item.active{border-color:var(--primary);background:#eef4ff;}
  .list-item .actions{display:flex;gap:6px;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;border-radius:999px;padding:4px 10px;font-size:12px;margin:3px;}
  .chip button{border:none;background:transparent;padding:0;color:var(--bad);font-weight:800;cursor:pointer;}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal{background:#fff;border-radius:14px;padding:22px;max-width:640px;width:100%;max-height:88vh;overflow:auto;}
  .modal h3{margin-top:0;}
  .field{margin-bottom:12px;}

<script>
/* ===================== STATE ===================== */
const STORAGE_KEY = 'qldhs_data_v2';
const DEFAULT_SUBJECTS = ["Toán","Ngữ văn","Tiếng Anh","Vật lí","Hóa học","Sinh học","Lịch sử","Địa lí","GDCD","Tin học","Công nghệ","Thể dục","GDQP-AN"];

const DEFAULT_THRESHOLDS = {
  tot:{dtb:8.0, minMon:6.5},
  kha:{dtb:6.5, minMon:5.0},
  dat:{dtb:5.0, minMon:3.5},
  watch:{weakSubject:3.5, declineDrop:1.0},
  progress:{riseImprove:1.0, excellentSubject:9.0, nearPromoteGap:0.3}
};

const DEFAULT_EXAM_LINKS = {
  chung: 'https://drive.google.com/drive/folders/1e9wqJyLc58sg1ydKFlOF7OhkVbf4gvo8?usp=sharing',
  lop10: '',
  lop11: '',
  lop12: ''
};

function uid(){ return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      if(!s.thresholds) s.thresholds = JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS));
      if(!s.thresholds.watch) s.thresholds.watch = JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS.watch));
      if(!s.thresholds.progress) s.thresholds.progress = JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS.progress));
      if(s.gsheetUrl===undefined) s.gsheetUrl = '';
      if(!s.examLinks) s.examLinks = JSON.parse(JSON.stringify(DEFAULT_EXAM_LINKS));
      return s;
    }
  }catch(e){ console.warn('Không đọc được dữ liệu cũ', e); }
  return { classes: [], currentClassId: null, thresholds: JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS)), gsheetUrl: '', examLinks: JSON.parse(JSON.stringify(DEFAULT_EXAM_LINKS)) };
}

let state = loadState();

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getCurrentClass(){
  return state.classes.find(c=>c.id===state.currentClassId) || null;
}

function ensureClassShape(c){
  if(!c.subjects) c.subjects = [];
  if(!c.students) c.students = [];
  if(!c.scores) c.scores = {};
  if(!c.colCounts) c.colCounts = {};
  if(!c.customComments) c.customComments = {};
  if(!c.subjectComments) c.subjectComments = {};
  if(!c.studentNotes) c.studentNotes = {};
  if(!c.goals) c.goals = {};
  return c;
}

/* ===================== SCORE HELPERS ===================== */
function roundVN(x){
  if(x===null||x===undefined||isNaN(x)) return null;
  return Math.round(x*10)/10;
}

function colKey(subjectId, semester){ return subjectId+'_'+semester; }

function getColCounts(cls, subjectId, semester){
  const key = colKey(subjectId, semester);
  if(!cls.colCounts[key]) cls.colCounts[key] = { tx:2, gk:2 };
  return cls.colCounts[key];
}

function getScoreEntry(cls, studentId, subjectId, semester){
  if(!cls.scores[studentId]) cls.scores[studentId] = {};
  if(!cls.scores[studentId][subjectId]) cls.scores[studentId][subjectId] = {};
  if(!cls.scores[studentId][subjectId][semester]) cls.scores[studentId][subjectId][semester] = { tx:[], gk:[], ck:[] };
  return cls.scores[studentId][subjectId][semester];
}

// Tính điểm trung bình môn 1 học kỳ: hệ số tx=1, gk=2, ck=3
function calcTBMonHK(entry){
  if(!entry) return null;
  let sum=0, weight=0;
  (entry.tx||[]).forEach(v=>{ if(v!==null && v!==undefined && v!==''){ sum+=Number(v)*1; weight+=1; } });
  (entry.gk||[]).forEach(v=>{ if(v!==null && v!==undefined && v!==''){ sum+=Number(v)*2; weight+=2; } });
  (entry.ck||[]).forEach(v=>{ if(v!==null && v!==undefined && v!==''){ sum+=Number(v)*3; weight+=3; } });
  if(weight===0) return null;
  return roundVN(sum/weight);
}

function calcTBMonNam(tbHK1, tbHK2){
  if(tbHK1===null || tbHK2===null) return null;
  return roundVN((tbHK1 + tbHK2*2)/3);
}

// Tính bảng TB môn cho 1 học sinh theo mode: 'hk1' | 'hk2' | 'nam'
function getStudentSubjectAverages(cls, studentId, mode){
  const result = {}; // subjectId -> tb
  cls.subjects.forEach(sub=>{
    const e1 = cls.scores?.[studentId]?.[sub.id]?.hk1;
    const e2 = cls.scores?.[studentId]?.[sub.id]?.hk2;
    const tb1 = calcTBMonHK(e1);
    const tb2 = calcTBMonHK(e2);
    if(mode==='hk1') result[sub.id]=tb1;
    else if(mode==='hk2') result[sub.id]=tb2;
    else result[sub.id]=calcTBMonNam(tb1,tb2);
  });
  return result;
}

function calcOverall(subjectAverages){
  const vals = Object.values(subjectAverages).filter(v=>v!==null && v!==undefined);
  if(vals.length===0) return { dtb:null, min:null, count:0 };
  const dtb = roundVN(vals.reduce((a,b)=>a+b,0)/vals.length);
  const min = Math.min(...vals);
  return { dtb, min, count: vals.length };
}

function classify(overall, thresholds){
  if(overall.dtb===null || overall.count===0) return 'none';
  const t = thresholds || DEFAULT_THRESHOLDS;
  if(overall.dtb>=t.tot.dtb && overall.min>=t.tot.minMon) return 'tot';
  if(overall.dtb>=t.kha.dtb && overall.min>=t.kha.minMon) return 'kha';
  if(overall.dtb>=t.dat.dtb && overall.min>=t.dat.minMon) return 'dat';
  return 'chuadat';
}

const CLASSIFY_LABEL = { tot:'Tốt', kha:'Khá', dat:'Đạt', chuadat:'Chưa đạt', none:'Chưa có điểm' };
const CLASSIFY_CLASS = { tot:'tot', kha:'kha', dat:'dat', chuadat:'chuadat', none:'none' };

// Xếp loại theo mode được chọn; nếu chọn "Cả năm" nhưng chưa đủ điểm 2 học kỳ,
// tự động dùng tạm học kỳ nào đã có điểm (ưu tiên HK II) để không bỏ sót học sinh cần theo dõi.
function getEffectiveClassification(cls, studentId, mode){
  let effectiveMode = mode;
  let subjAvgs = getStudentSubjectAverages(cls, studentId, mode);
  let overall = calcOverall(subjAvgs);
  if(overall.count===0 && mode==='nam'){
    const alt2 = getStudentSubjectAverages(cls, studentId, 'hk2');
    const o2 = calcOverall(alt2);
    if(o2.count>0){ subjAvgs=alt2; overall=o2; effectiveMode='hk2'; }
    else{
      const alt1 = getStudentSubjectAverages(cls, studentId, 'hk1');
      const o1 = calcOverall(alt1);
      if(o1.count>0){ subjAvgs=alt1; overall=o1; effectiveMode='hk1'; }
    }
  }
  const label = classify(overall, state.thresholds);
  return { subjAvgs, overall, label, effectiveMode, usedFallback: effectiveMode!==mode };
}

/* ---- Random có kiểm soát (seeded) để mỗi học sinh có nhận xét khác nhau nhưng ổn định ---- */
function hashSeed(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h;
}
function pickVariant(seed, arr){
  if(!arr || arr.length===0) return '';
  return arr[hashSeed(String(seed)) % arr.length];
}

const OVERALL_COMMENT_VARIANTS = {
  tot:{
    open:[
      'Học lực xếp loại Tốt.',
      'Kết quả học tập xếp loại Tốt, rất đáng khen ngợi.',
      'Đạt xếp loại Tốt, thể hiện rõ sự nỗ lực và chăm chỉ.',
      'Xếp loại Tốt — một kết quả học tập rất ấn tượng.',
      'Học tập xuất sắc, đạt xếp loại Tốt trong đợt này.'
    ],
    close:[
      'Cần tiếp tục phát huy và duy trì kết quả học tập.',
      'Mong em giữ vững phong độ và tiếp tục cố gắng hơn nữa.',
      'Hãy tiếp tục phát huy tinh thần học tập tích cực này.',
      'Cần duy trì thành tích này trong thời gian tới.',
      'Rất mong em tiếp tục nỗ lực để đạt kết quả tốt hơn nữa.'
    ]
  },
  kha:{
    open:[
      'Học lực xếp loại Khá.',
      'Kết quả học tập xếp loại Khá, khá ổn định.',
      'Đạt xếp loại Khá, cần cố gắng hơn nữa.',
      'Xếp loại Khá — một kết quả tương đối tốt.',
      'Học tập ở mức Khá, có nhiều tiềm năng để tiến bộ hơn.'
    ],
    close:[
      'Cần chăm chỉ hơn để đạt loại Tốt.',
      'Nếu cố gắng thêm một chút, em hoàn toàn có thể đạt loại Tốt.',
      'Hãy tiếp tục nỗ lực để nâng cao kết quả học tập.',
      'Cần đầu tư thêm thời gian ôn luyện để tiến bộ hơn.',
      'Cố gắng phát huy thêm để đạt kết quả cao hơn trong thời gian tới.'
    ]
  },
  dat:{
    open:[
      'Học lực xếp loại Đạt.',
      'Kết quả học tập xếp loại Đạt, ở mức trung bình.',
      'Đạt yêu cầu, nhưng còn nhiều điều cần cải thiện.',
      'Xếp loại Đạt — cần cố gắng nhiều hơn trong thời gian tới.',
      'Kết quả học tập ở mức Đạt, cần được quan tâm nhiều hơn.'
    ],
    close:[
      'Cần tăng cường ôn tập và rèn luyện ý thức học tập.',
      'Em cần dành nhiều thời gian hơn cho việc học.',
      'Cần có kế hoạch học tập cụ thể để cải thiện kết quả.',
      'Rất cần sự đồng hành của gia đình để cải thiện kết quả học tập.',
      'Cần cố gắng nhiều hơn để theo kịp chương trình học.'
    ]
  },
  chuadat:{
    open:[
      'Học lực xếp loại Chưa đạt.',
      'Kết quả học tập hiện tại chưa đạt yêu cầu.',
      'Xếp loại Chưa đạt, cần có biện pháp cải thiện ngay.',
      'Kết quả học tập đáng lo ngại, cần được quan tâm sát sao.',
      'Chưa đạt yêu cầu, cần nỗ lực rất nhiều trong thời gian tới.'
    ],
    close:[
      'Đề nghị phụ đạo thêm và cần sự quan tâm sát sao từ gia đình.',
      'Cần xây dựng kế hoạch học tập nghiêm túc và được hỗ trợ kịp thời.',
      'Rất cần sự phối hợp giữa gia đình và nhà trường để giúp em tiến bộ.',
      'Cần được kèm cặp thêm để bắt kịp chương trình học.',
      'Đề nghị gia đình quan tâm, đôn đốc việc học tập của em nhiều hơn.'
    ]
  }
};

function generateAutoComment(cls, student, mode){
  const subjAvgs = getStudentSubjectAverages(cls, student.id, mode);
  const overall = calcOverall(subjAvgs);
  const label = classify(overall, state.thresholds);
  if(label==='none'){
    return 'Chưa có đủ dữ liệu điểm để nhận xét.';
  }
  const strong = [], weak = [], medium = [];
  cls.subjects.forEach(sub=>{
    const v = subjAvgs[sub.id];
    if(v===null||v===undefined) return;
    if(v>=8) strong.push(sub.name);
    else if(v<5) weak.push(sub.name);
    else medium.push(sub.name);
  });

  const variants = OVERALL_COMMENT_VARIANTS[label];
  const seedBase = student.id+'_'+mode;
  let parts = [];
  parts.push(pickVariant(seedBase+'_open', variants.open));
  if(label==='tot'){
    if(strong.length) parts.push('Các môn học nổi bật: '+strong.join(', ')+'.');
  } else if(label==='kha'){
    if(strong.length) parts.push('Học tốt ở các môn: '+strong.join(', ')+'.');
    if(weak.length) parts.push('Cần cố gắng thêm ở môn: '+weak.join(', ')+'.');
  } else if(label==='dat'){
    if(weak.length) parts.push('Cần tập trung cải thiện ở các môn: '+weak.join(', ')+'.');
  } else {
    if(weak.length) parts.push('Cần nỗ lực nhiều hơn ở các môn: '+weak.join(', ')+'.');
  }
  parts.push(pickVariant(seedBase+'_close', variants.close));

  // So sánh HK1 vs HK2 nếu đang xem cả năm
  if(mode==='nam'){
    const avg1 = getStudentSubjectAverages(cls, student.id, 'hk1');
    const avg2 = getStudentSubjectAverages(cls, student.id, 'hk2');
    const o1 = calcOverall(avg1), o2 = calcOverall(avg2);
    if(o1.dtb!==null && o2.dtb!==null){
      const diff = o2.dtb - o1.dtb;
      if(diff>=0.5) parts.push('Có tiến bộ rõ rệt so với học kỳ I.');
      else if(diff<=-0.5) parts.push('Kết quả học kỳ II giảm sút so với học kỳ I, cần lưu ý.');
    }
  }
  return parts.join(' ');
}

function generateAutoSubjectComment(tb, trend, seed){
  if(tb===null || tb===undefined) return 'Chưa có điểm.';
  let tier;
  if(tb>=8) tier='tot';
  else if(tb>=6.5) tier='kha';
  else if(tb>=5) tier='dat';
  else tier='yeu';
  let base = pickVariant(seed!==undefined ? seed : tb+'_'+tier, SUBJECT_COMMENT_VARIANTS[tier]);
  if(trend!==null && trend!==undefined){
    if(trend>=1) base += ' Có tiến bộ rõ so với học kỳ I.';
    else if(trend<=-1) base += ' Giảm sút so với học kỳ I, cần lưu ý.';
  }
  return base;
}

// Lấy danh sách các điểm đã nhập theo đúng trình tự thời gian (HK I rồi HK II) cho 1 môn học
function getSubjectTrendPoints(cls, studentId, subjectId){
  const points = [];
  ['hk1','hk2'].forEach(sem=>{
    const semLabel = sem==='hk1' ? 'I' : 'II';
    const entry = getScoreEntry(cls, studentId, subjectId, sem);
    (entry.tx||[]).forEach((v,i)=>{
      if(v!==null && v!==undefined && v!==''){ points.push({ label:semLabel+'.M'+(i+1), value:Number(v), type:'tx', sem }); }
    });
    (entry.gk||[]).forEach((v,i)=>{
      if(v!==null && v!==undefined && v!==''){ points.push({ label:semLabel+'.1T'+(i+1), value:Number(v), type:'gk', sem }); }
    });
    (entry.ck||[]).forEach((v,i)=>{
      if(v!==null && v!==undefined && v!==''){ points.push({ label:semLabel+'.HK', value:Number(v), type:'ck', sem }); }
    });
  });
  return points;
}

function renderTrendSVG(points){
  if(points.length===0){
    return '<p class="muted">Chưa có đủ điểm để vẽ biểu đồ. Hãy nhập điểm cho môn này ở tab "Nhập điểm".</p>';
  }
  const w = Math.max(420, points.length*54);
  const h = 230;
  const padL = 32, padR = 16, padT = 16, padB = 40;
  const plotW = w-padL-padR, plotH = h-padT-padB;
  const xStep = points.length>1 ? plotW/(points.length-1) : 0;
  const yFor = v => padT + plotH - (Math.max(0,Math.min(10,v))/10)*plotH;
  const xFor = i => padL + i*xStep;
  const colorFor = t => t==='tx' ? '#2563eb' : t==='gk' ? '#d97706' : '#16a34a';

  let grid = '';
  for(let g=0; g<=10; g+=2){
    const y = yFor(g);
    grid += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/><text x="${padL-6}" y="${y+4}" font-size="10" fill="#64748b" text-anchor="end">${g}</text>`;
  }
  const path = points.map((p,i)=> (i===0?'M':'L')+xFor(i).toFixed(1)+','+yFor(p.value).toFixed(1)).join(' ');
  const dots = points.map((p,i)=> `<circle cx="${xFor(i).toFixed(1)}" cy="${yFor(p.value).toFixed(1)}" r="5" fill="${colorFor(p.type)}" stroke="#fff" stroke-width="1.5"><title>${p.label}: ${p.value}</title></circle>`).join('');
  const valueLabels = points.map((p,i)=> `<text x="${xFor(i).toFixed(1)}" y="${yFor(p.value)-10}" font-size="10" fill="#334155" text-anchor="middle">${p.value}</text>`).join('');
  const xLabels = points.map((p,i)=> `<text x="${xFor(i).toFixed(1)}" y="${h-padB+16}" font-size="10" fill="#64748b" text-anchor="middle">${p.label}</text>`).join('');
  let semDivider = '';
  const firstHk2Idx = points.findIndex(p=>p.sem==='hk2');
  if(firstHk2Idx>0){
    const dx = xFor(firstHk2Idx) - xStep/2;
    semDivider = `<line x1="${dx.toFixed(1)}" y1="${padT}" x2="${dx.toFixed(1)}" y2="${h-padB}" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px;display:block;">
    ${grid}${semDivider}
    <path d="${path}" fill="none" stroke="#94a3b8" stroke-width="2"/>
    ${dots}${valueLabels}${xLabels}
  </svg>
  <div class="row" style="margin-top:6px;font-size:12px;color:var(--muted);">
    <span>● <span style="color:#2563eb;">Miệng/15p</span></span>
    <span>● <span style="color:#d97706;">1 tiết</span></span>
    <span>● <span style="color:#16a34a;">Học kỳ</span></span>
  </div>`;
}

/* ===================== HỌC SINH CẦN CHÚ Ý (WATCHLIST) ===================== */
function computeWatchlist(cls, mode){
  const t = state.thresholds.watch || DEFAULT_THRESHOLDS.watch;
  const results = [];
  cls.students.forEach(student=>{
    const avg1 = getStudentSubjectAverages(cls, student.id, 'hk1');
    const avg2 = getStudentSubjectAverages(cls, student.id, 'hk2');
    const o1 = calcOverall(avg1), o2 = calcOverall(avg2);
    let trend = null;
    if(o1.dtb!==null && o2.dtb!==null) trend = roundVN(o2.dtb - o1.dtb);

    // Xếp loại theo mode đang chọn; nếu mode "cả năm" nhưng chưa đủ dữ liệu 2 học kỳ
    // thì dùng tạm học kỳ nào đã có điểm để không bỏ sót học sinh yếu ngay từ đầu năm.
    const eff = getEffectiveClassification(cls, student.id, mode);
    const overall = eff.overall, label = eff.label, usedFallback = eff.usedFallback;

    // Môn điểm rất thấp: xét trên cả HK I và HK II đã có điểm (không chỉ riêng mode đang chọn)
    const weakSubjects = [];
    cls.subjects.forEach(sub=>{
      [avg1[sub.id], avg2[sub.id]].forEach(v=>{
        if(v!==null && v!==undefined && v < t.weakSubject && !weakSubjects.find(w=>w.name===sub.name)){
          weakSubjects.push({ name: sub.name, tb: v });
        }
      });
    });

    const reasons = [];
    if(label==='chuadat') reasons.push('Xếp loại '+CLASSIFY_LABEL[label]+(usedFallback?' (theo dữ liệu học kỳ đã có)':''));
    if(weakSubjects.length) reasons.push('Có môn điểm rất thấp: '+weakSubjects.map(w=>w.name+' ('+w.tb.toFixed(1)+')').join(', '));
    if(trend!==null && trend <= -t.declineDrop) reasons.push('Giảm sút rõ rệt giữa HK I và HK II ('+trend.toFixed(1)+' điểm)');

    if(reasons.length>0){
      results.push({ student, label, overall, trend, weakSubjects, reasons });
    }
  });
  const order = {chuadat:0, dat:1, kha:2, tot:3, none:4};
  results.sort((a,b)=>{
    if(a.label!==b.label) return order[a.label]-order[b.label];
    return (a.overall.dtb ?? 99) - (b.overall.dtb ?? 99);
  });
  return results;
}

function computeMissingScores(cls, semester){
  const results = [];
  cls.students.forEach(student=>{
    const missing = [];
    cls.subjects.forEach(sub=>{
      const e = getScoreEntry(cls, student.id, sub.id, semester);
      const has = (e.tx&&e.tx.length) || (e.gk&&e.gk.length) || (e.ck&&e.ck.length);
      if(!has) missing.push(sub.name);
    });
    if(missing.length>0) results.push({ student, missing });
  });
  return results;
}

/* ===================== TIẾN BỘ / XUẤT SẮC / CẬN KỀ LÊN HẠNG ===================== */
function computeProgressList(cls, mode){
  const t = state.thresholds.progress || DEFAULT_THRESHOLDS.progress;
  const results = [];
  cls.students.forEach(student=>{
    const avg1 = getStudentSubjectAverages(cls, student.id, 'hk1');
    const avg2 = getStudentSubjectAverages(cls, student.id, 'hk2');
    const o1 = calcOverall(avg1), o2 = calcOverall(avg2);
    let trend = null;
    if(o1.dtb!==null && o2.dtb!==null) trend = roundVN(o2.dtb - o1.dtb);
    const eff = getEffectiveClassification(cls, student.id, mode);
    const avgMode = mode==='hk1' ? avg1 : mode==='hk2' ? avg2 : getStudentSubjectAverages(cls, student.id, 'nam');

    const excellentSubjects = [];
    cls.subjects.forEach(sub=>{
      const v = avgMode[sub.id];
      if(v!==null && v!==undefined && v>=t.excellentSubject) excellentSubjects.push({ name: sub.name, tb: v });
    });

    const reasons = [];
    if(trend!==null && trend >= t.riseImprove) reasons.push('Tiến bộ vượt bậc: tăng '+trend.toFixed(1)+' điểm từ HK I sang HK II');
    if(excellentSubjects.length) reasons.push('Có môn đạt điểm xuất sắc: '+excellentSubjects.map(s=>s.name+' ('+s.tb.toFixed(1)+')').join(', '));
    if(eff.label==='tot') reasons.push('Xếp loại Tốt'+(eff.overall.dtb!==null?' (ĐTB '+eff.overall.dtb.toFixed(1)+')':''));

    if(reasons.length>0){
      results.push({ student, trend, excellentSubjects, label: eff.label, overall: eff.overall, reasons });
    }
  });
  results.sort((a,b)=>(b.overall.dtb ?? 0)-(a.overall.dtb ?? 0));
  return results;
}

function computeNearPromotion(cls, mode){
  const t = state.thresholds;
  const gapAllow = (state.thresholds.progress || DEFAULT_THRESHOLDS.progress).nearPromoteGap;
  const tiers = [
    { key:'dat', next:'kha', nextThreshold:t.kha },
    { key:'kha', next:'tot', nextThreshold:t.tot }
  ];
  const results = [];
  cls.students.forEach(student=>{
    const eff = getEffectiveClassification(cls, student.id, mode);
    if(eff.overall.dtb===null) return;
    const tierInfo = tiers.find(x=>x.key===eff.label);
    if(!tierInfo) return;
    const gap = roundVN(tierInfo.nextThreshold.dtb - eff.overall.dtb);
    if(gap!==null && gap>=0 && gap<=gapAllow){
      const minOk = eff.overall.min!==null && eff.overall.min>=tierInfo.nextThreshold.minMon;
      results.push({ student, fromLabel: eff.label, toLabel: tierInfo.next, gap, minOk, overall: eff.overall });
    }
  });
  results.sort((a,b)=>a.gap-b.gap);
  return results;
}

function getAllRecentNotes(cls, limit){
  const all = [];
  Object.entries(cls.studentNotes||{}).forEach(([sid, notes])=>{

    (notes||[]).forEach(n=> all.push(Object.assign({}, n, { studentName: student.name, studentId: sid })));

function copyTextToClipboard(text, onDone){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>onDone(true)).catch(()=>fallbackCopy(text, onDone));
  } else {
    fallbackCopy(text, onDone);
  }
}
function fallbackCopy(text, onDone){
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    onDone(ok);
  }catch(e){ onDone(false); }
}

function handleImportExcel(e, cls){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try{
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      if(!rows.length){ alert('File rỗng.'); return; }

      // Tìm cột tên & giới tính & ngày sinh & SĐT phụ huynh dựa trên header dòng đầu
      let headerRowIdx = 0;
      let nameCol = -1, genderCol=-1, dobCol=-1, phoneCol=-1;
      const header = rows[0].map(h=>String(h).toLowerCase());
      header.forEach((h,i)=>{
        if(nameCol===-1 && (h.includes('tên') || h.includes('ten') || h.includes('name'))) nameCol=i;
        if(genderCol===-1 && (h.includes('giới tính')||h.includes('gioi tinh')||h.includes('gender'))) genderCol=i;
        if(dobCol===-1 && (h.includes('ngày sinh')||h.includes('ngay sinh')||h.includes('dob')||h.includes('birth'))) dobCol=i;
        if(phoneCol===-1 && (h.includes('phụ huynh')||h.includes('phu huynh')||h.includes('sđt')||h.includes('sdt')||h.includes('điện thoại')||h.includes('dien thoai')||h.includes('phone'))) phoneCol=i;
      });
      let startRow = 1;
      if(nameCol===-1){
        // Không tìm thấy header rõ ràng -> dùng cột đầu tiên có chữ, bắt đầu từ dòng 0
        nameCol = 0;
        startRow = 0;
      }

      let added = 0;
      for(let r=startRow; r<rows.length; r++){
        const row = rows[r];
        const rawName = row[nameCol];
        const name = rawName!==undefined ? String(rawName).trim() : '';
        if(!name) continue;
        // Bỏ qua nếu dòng trông giống header lặp lại hoặc là số STT thuần
        if(/^(stt|số\s*tt|họ và tên|ho va ten|name)$/i.test(name)) continue;
        cls.students.push({
          id: uid(),
          name,
          gender: genderCol>=0 ? String(row[genderCol]||'').trim() : '',
          dob: dobCol>=0 ? String(row[dobCol]||'').trim() : '',
          parentPhone: phoneCol>=0 ? String(row[phoneCol]||'').trim() : ''
        });
        added++;
      }
      saveState(); renderAll();
      alert(`Đã nhập ${added} học sinh từ file Excel.`);
    }catch(err){
      console.error(err);
      alert('Không đọc được file. Vui lòng kiểm tra định dạng file Excel.');
    } finally {
      e.target.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderScoreTable(cls){
  const wrap = document.getElementById('scoresTableWrap');
  const subjectId = scoresUI.subjectId, semester = scoresUI.semester;
  const cc = getColCounts(cls, subjectId, semester);

  let head = '<tr><th style="width:40px;">STT</th><th class="name-cell">Họ và tên</th>';
  for(let i=0;i<cc.tx;i++) head += `<th style="width:60px;">M/15p ${i+1} <button class="small" style="padding:0 4px;" data-remove-col="tx:${i}" title="Xoá cột">✕</button></th>`;
  for(let i=0;i<cc.gk;i++) head += `<th style="width:60px;">1 tiết ${i+1} <button class="small" style="padding:0 4px;" data-remove-col="gk:${i}" title="Xoá cột">✕</button></th>`;
  head += '<th style="width:70px;">Học kỳ</th><th style="width:70px;">TB môn</th><th style="min-width:220px;">Nhận xét môn</th></tr>';

  let body = '';
  cls.students.forEach((s,idx)=>{
    const entry = getScoreEntry(cls, s.id, subjectId, semester);
    body += `<tr><td>${idx+1}</td><td class="name-cell">${escapeHtml(s.name)}</td>`;
    for(let i=0;i<cc.tx;i++){
      const v = entry.tx[i] ?? '';
      body += `<td><input type="number" min="0" max="10" step="0.1" value="${v}" data-student="${s.id}" data-type="tx" data-idx="${i}"></td>`;
    }
    for(let i=0;i<cc.gk;i++){
      const v = entry.gk[i] ?? '';
      body += `<td><input type="number" min="0" max="10" step="0.1" value="${v}" data-student="${s.id}" data-type="gk" data-idx="${i}"></td>`;
    }
    const ckv = entry.ck[0] ?? '';
    body += `<td><input type="number" min="0" max="10" step="0.1" value="${ckv}" data-student="${s.id}" data-type="ck" data-idx="0"></td>`;
    const tb = calcTBMonHK(entry);
    const subjComment = getSubjectComment(cls, s.id, subjectId, semester, tb, null);
    body += `<td><strong>${tb===null?'—':tb.toFixed(1)}</strong></td>`;
    body += `<td style="text-align:left;font-size:12px;">
        <div style="display:flex;gap:4px;align-items:flex-start;">
          <span style="flex:1;">${escapeHtml(subjComment)}</span>
          <button class="small" style="flex-shrink:0;" data-edit-subj-comment="${s.id}" title="Sửa nhận xét">✎</button>
        </div>
      </td></tr>`;
  });

  wrap.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;

  wrap.querySelectorAll('[data-edit-subj-comment]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const studentId = btn.dataset.editSubjComment;
      const student = cls.students.find(s=>s.id===studentId);
      const entry = getScoreEntry(cls, studentId, subjectId, semester);
      const tb = calcTBMonHK(entry);
      openSubjectCommentModal(cls, student, subjectId, semester, tb, null, ()=>renderScoreTable(cls));
    });
  });

  wrap.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const studentId = inp.dataset.student, type = inp.dataset.type, idx = Number(inp.dataset.idx);
      const entry = getScoreEntry(cls, studentId, subjectId, semester);
      let val = inp.value === '' ? null : Number(inp.value);
      if(val!==null && (isNaN(val) || val<0 || val>10)){
        alert('Điểm phải trong khoảng 0 - 10');
        inp.value = entry[type][idx] ?? '';
        return;
      }
      entry[type][idx] = val;
      saveState();
      renderScoreTable(cls);
    });
  });

  wrap.querySelectorAll('[data-remove-col]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [type, idxStr] = btn.dataset.removeCol.split(':');
      const idx = Number(idxStr);
      // Kiểm tra xem cột có dữ liệu ở học sinh nào không
      const hasData = cls.students.some(s=>{
        const e = getScoreEntry(cls, s.id, subjectId, semester);
        return e[type][idx] !== null && e[type][idx] !== undefined && e[type][idx] !== '';
      });
      if(hasData && !confirm('Cột này đang có điểm, xoá sẽ mất dữ liệu. Tiếp tục?')) return;
      cls.students.forEach(s=>{
        const e = getScoreEntry(cls, s.id, subjectId, semester);
        e[type].splice(idx,1);
      });
      cc[type] = Math.max(type==='ck'?1:1, cc[type]-1);
      saveState();
      renderScoreTable(cls);
    });
  });
}

function exportSummaryExcel(cls, includeSubjComments){
  const mode = summaryUI.mode;
  const modeLabel = mode==='hk1'?'Học kỳ I': mode==='hk2'?'Học kỳ II':'Cả năm';
  const data = cls.students.map((s,idx)=>{
    const subjAvgs = getStudentSubjectAverages(cls, s.id, mode);
    const overall = calcOverall(subjAvgs);
    const label = classify(overall, state.thresholds);
    const row = { 'STT': idx+1, 'Họ và tên': s.name };
    cls.subjects.forEach(sub=>{
      row[sub.name] = subjAvgs[sub.id]===null?'':subjAvgs[sub.id];
      if(includeSubjComments){
        let trend = null;
        if(mode==='nam'){
          const tb1 = calcTBMonHK(getScoreEntry(cls, s.id, sub.id, 'hk1'));
          const tb2 = calcTBMonHK(getScoreEntry(cls, s.id, sub.id, 'hk2'));
          if(tb1!==null && tb2!==null) trend = tb2-tb1;
        }
        row['NX '+sub.name] = getSubjectComment(cls, s.id, sub.id, mode, subjAvgs[sub.id], trend);
      }
    });
    row['ĐTB'] = overall.dtb===null?'':overall.dtb;
    row['Xếp loại'] = CLASSIFY_LABEL[label];
    row['Nhận xét'] = getComment(cls, s, mode);
    return row;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, modeLabel.replace(/[\\/?*[\]]/g,''));
  XLSX.writeFile(wb, `TongHop_${cls.name}_${modeLabel}.xlsx`);
}

function exportMessagesExcel(cls){

    studentList = cls.students.filter(s=>watchIds.has(s.id));

  const data = studentList.map((s,idx)=>{

    return {

      'Họ và tên': s.name,
      'SĐT phụ huynh': s.parentPhone||'',
      'ĐTB': eff.overall.dtb===null?'':eff.overall.dtb,

function openStudentDetail(cls, studentId, mode){
  const student = cls.students.find(s=>s.id===studentId);

  overlay.className = 'modal-overlay';
  const modeLabel = mode==='hk1'?'Học kỳ I':mode==='hk2'?'Học kỳ II':'Cả năm';

  function buildSubjectRows(){
    return cls.subjects.map(sub=>{
      const e1 = getScoreEntry(cls, studentId, sub.id, 'hk1');
      const e2 = getScoreEntry(cls, studentId, sub.id, 'hk2');
      const tb1 = calcTBMonHK(e1), tb2 = calcTBMonHK(e2);
      const tbNam = calcTBMonNam(tb1,tb2);
      let tbForMode, trend=null;
      if(mode==='hk1') tbForMode=tb1;
      else if(mode==='hk2') tbForMode=tb2;
      else { tbForMode=tbNam; if(tb1!==null && tb2!==null) trend=tb2-tb1; }
      const subjComment = getSubjectComment(cls, studentId, sub.id, mode, tbForMode, trend);
      return `<tr><td class="name-cell">${escapeHtml(sub.name)}</td>
        <td>${tb1===null?'—':tb1.toFixed(1)}</td>
        <td>${tb2===null?'—':tb2.toFixed(1)}</td>

            <span style="flex:1;">${escapeHtml(subjComment)}</span>
            <button class="small" style="flex-shrink:0;" data-edit-subj="${sub.id}" title="Sửa nhận xét">✎</button>
          </div>
        </td></tr>`;
    }).join('');
  }

  function bindSubjEditButtons(){
    overlay.querySelectorAll('[data-edit-subj]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const subjectId = btn.dataset.editSubj;
        const e1 = getScoreEntry(cls, studentId, subjectId, 'hk1');
        const e2 = getScoreEntry(cls, studentId, subjectId, 'hk2');
        const tb1 = calcTBMonHK(e1), tb2 = calcTBMonHK(e2);
        let tbForMode, trend=null;
        if(mode==='hk1') tbForMode=tb1;
        else if(mode==='hk2') tbForMode=tb2;
        else { tbForMode=calcTBMonNam(tb1,tb2); if(tb1!==null && tb2!==null) trend=tb2-tb1; }
        openSubjectCommentModal(cls, student, subjectId, mode, tbForMode, trend, ()=>{
          overlay.querySelector('#subjectRowsBody').innerHTML = buildSubjectRows();
          bindSubjEditButtons();
        });
      });
    });
  }

  const commentKey = student.id+'_'+mode;
  const currentComment = getComment(cls, student, mode);

  overlay.innerHTML = `
    <div class="modal" style="max-width:760px;">
      <h3>👤 ${escapeHtml(student.name)} — ${escapeHtml(cls.name)}</h3>
      <table style="margin-bottom:14px;">
        <thead><tr><th class="name-cell">Môn học</th><th>TB HK I</th><th>TB HK II</th><th>TB cả năm</th><th class="name-cell" style="min-width:200px;">Nhận xét môn (${escapeHtml(modeLabel)})</th></tr></thead>
        <tbody id="subjectRowsBody">${buildSubjectRows()}</tbody>
      </table>
      <div class="field">
        <label>Nhận xét chung (đang xem: ${escapeHtml(modeLabel)})</label>
        <textarea id="commentBox">${escapeHtml(currentComment)}</textarea>
      </div>
      <div class="field">
        <label>🎯 Mục tiêu cá nhân (${escapeHtml(modeLabel)})</label>
        <div id="goalSection"></div>
      </div>
      <div class="modal-actions">
        <button class="link-btn" id="btnResetComment">↺ Khôi phục nhận xét tự động</button>
        <button id="btnCloseDetail">Đóng</button>
        <button class="primary" id="btnSaveComment">Lưu nhận xét</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  bindSubjEditButtons();
  renderGoalSection();

  function renderGoalSection(){
    const goal = getGoal(cls, studentId, mode);
    const eff = getEffectiveClassification(cls, studentId, mode);
    const current = eff.overall.dtb;
    let progressMsg = '';
    if(goal){
      if(current===null) progressMsg = 'Chưa có đủ điểm để so sánh với mục tiêu.';
      else if(current>=goal.target) progressMsg = `<span style="color:var(--good);font-weight:600;">🎉 Đã đạt mục tiêu! (ĐTB hiện tại ${current.toFixed(1)})</span>`;
      else progressMsg = `Còn thiếu <strong>${(goal.target-current).toFixed(1)}</strong> điểm để đạt mục tiêu (ĐTB hiện tại ${current.toFixed(1)}).`;
    }
    overlay.querySelector('#goalSection').innerHTML = `
      <div class="row">
        <input type="number" id="goalTargetInput" step="0.1" style="max-width:120px;" value="${goal?goal.target:''}" placeholder="Điểm mục tiêu">
        <input type="text" id="goalNoteInput" placeholder="Ghi chú mục tiêu (tuỳ chọn)" value="${escapeHtml(goal ? (goal.note||'') : '')}" style="flex:1;min-width:160px;">
        <button class="small primary" id="btnSaveGoal">Lưu</button>
        ${goal?`<button class="small danger" id="btnClearGoal">Xoá</button>`:''}
      </div>
      ${progressMsg?`<p class="muted" style="margin-top:6px;">${progressMsg}</p>`:''}
    `;
    overlay.querySelector('#btnSaveGoal').addEventListener('click', ()=>{
      const target = Number(overlay.querySelector('#goalTargetInput').value);
      if(!target || target<=0) return alert('Vui lòng nhập điểm mục tiêu hợp lệ.');
      const note = overlay.querySelector('#goalNoteInput').value.trim();
      setGoal(cls, studentId, mode, target, note);
      renderGoalSection();
    });
    const clearBtn = overlay.querySelector('#btnClearGoal');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{
      clearGoal(cls, studentId, mode);
      renderGoalSection();
    });
  }

  overlay.querySelector('#btnCloseDetail').addEventListener('click', ()=>overlay.remove());
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#btnResetComment').addEventListener('click', ()=>{
    delete cls.customComments[commentKey];
    saveState();
    overlay.querySelector('#commentBox').value = generateAutoComment(cls, student, mode);
  });
  overlay.querySelector('#btnSaveComment').addEventListener('click', ()=>{
    cls.customComments[commentKey] = overlay.querySelector('#commentBox').value;
    saveState();
    overlay.remove();
    renderAll();
  });
}

/* ===================== ĐỒNG BỘ GOOGLE SHEETS (APPS SCRIPT) ===================== */
const APPS_SCRIPT_CODE = `function doGet(e) {
  var action = e.parameter.action;
  if (action === 'loadState') {
    var sheet = getOrCreateSheet_('AppData');
    var json = sheet.getRange('A1').getValue() || '{}';
    return jsonOutput_(JSON.parse(json));
  }
  return jsonOutput_({ error: 'Unknown action' });
}

function doPost(e) {
  var body = JSON.parse(e.postData.contents);
  var action = body.action;

  if (action === 'saveState') {
    var sheet = getOrCreateSheet_('AppData');
    sheet.getRange('A1').setValue(JSON.stringify(body.data));
    sheet.getRange('B1').setValue(new Date());
    return jsonOutput_({ ok: true, savedAt: new Date().toISOString() });
  }

  if (action === 'exportSummary') {
    var sheetName = String(body.className || 'Lop').substring(0, 90).replace(/[\\[\\]\\*\\/\\\\?:]/g, '');
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName(sheetName);
    if (sheet) ss.deleteSheet(sheet);
    sheet = ss.insertSheet(sheetName);
    sheet.getRange(1, 1, 1, body.headers.length).setValues([body.headers]).setFontWeight('bold');
    if (body.rows.length > 0) {
      sheet.getRange(2, 1, body.rows.length, body.headers.length).setValues(body.rows);
    }
    sheet.autoResizeColumns(1, body.headers.length);
    return jsonOutput_({ ok: true, sheet: sheetName });
  }

  return jsonOutput_({ ok: false, error: 'Unknown action' });
}

function jsonOutput_(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);
}

function getOrCreateSheet_(name) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName(name);
  if (!sheet) sheet = ss.insertSheet(name);
  return sheet;
}`;

async function backupToSheet(){
  const url = state.gsheetUrl;
  if(!url) return alert('Vui lòng nhập URL Web App Apps Script trước khi sao lưu.');
  try{
    const res = await fetch(url, {
      method:'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'saveState', data: state })
    });
    const json = await res.json();
    if(json.ok){
      alert('Đã sao lưu toàn bộ dữ liệu lên Google Sheet lúc '+ new Date(json.savedAt).toLocaleString('vi-VN')+'.');
    } else {
      alert('Có lỗi khi sao lưu: '+(json.error||'không rõ nguyên nhân'));
    }
  }catch(err){
    console.error(err);
    alert('Không thể kết nối tới Google Apps Script. Kiểm tra lại URL Web App và quyền truy cập (phải chọn "Bất kỳ ai").');
  }
}

async function restoreFromSheet(){
  const url = state.gsheetUrl;
  if(!url) return alert('Vui lòng nhập URL Web App Apps Script trước khi khôi phục.');
  if(!confirm('Khôi phục sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại trên máy này bằng dữ liệu đã lưu trên Google Sheet. Tiếp tục?')) return;
  try{
    const sep = url.includes('?') ? '&' : '?';
    const res = await fetch(url+sep+'action=loadState');
    const json = await res.json();
    if(json && json.classes){
      const savedUrl = state.gsheetUrl;
      state = json;
      if(!state.thresholds) state.thresholds = JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS));
      if(!state.thresholds.watch) state.thresholds.watch = JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS.watch));
      if(!state.gsheetUrl) state.gsheetUrl = savedUrl;
      saveState();
      alert('Đã khôi phục dữ liệu từ Google Sheet.');
      renderAll();
    } else {
      alert('Chưa có dữ liệu sao lưu nào trên Google Sheet này. Hãy bấm "Sao lưu" trước.');
    }
  }catch(err){
    console.error(err);
    alert('Không thể kết nối tới Google Apps Script. Kiểm tra lại URL Web App và quyền truy cập.');
  }
}

async function exportClassSummaryToSheet(cls){
  const url = state.gsheetUrl;
  if(!url) return alert('Vui lòng nhập URL Web App Apps Script trước khi xuất dữ liệu.');
  const mode = summaryUI.mode || 'nam';
  const headers = ['STT','Họ và tên', ...cls.subjects.map(s=>s.name), 'ĐTB','Xếp loại','Nhận xét'];
  const rows = cls.students.map((s,idx)=>{
    const subjAvgs = getStudentSubjectAverages(cls, s.id, mode);
    const overall = calcOverall(subjAvgs);
    const label = classify(overall, state.thresholds);
    const row = [idx+1, s.name];
    cls.subjects.forEach(sub=> row.push(subjAvgs[sub.id]===null?'':subjAvgs[sub.id]));
    row.push(overall.dtb===null?'':overall.dtb);
    row.push(CLASSIFY_LABEL[label]);
    row.push(getComment(cls, s, mode));
    return row;
  });
  try{
    const res = await fetch(url, {
      method:'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'exportSummary', className: cls.name, headers, rows })
    });
    const json = await res.json();
    if(json.ok){
      alert('Đã xuất bảng tổng hợp lớp "'+cls.name+'" lên Google Sheet (tab "'+json.sheet+'").');
    } else {
      alert('Có lỗi khi xuất dữ liệu: '+(json.error||'không rõ nguyên nhân'));
    }
  }catch(err){
    console.error(err);
    alert('Không thể kết nối tới Google Apps Script. Kiểm tra lại URL Web App và quyền truy cập.');
  }
}

/* ===================== GENERIC MODAL (form) ===================== */
function openModal({title, fields, onSubmit}){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const fieldsHtml = fields.map(f=>{
    if(f.type==='select'){
      const opts = f.options.map(o=>`<option value="${escapeHtml(o)}" ${o===f.value?'selected':''}>${o===''?'—':escapeHtml(o)}</option>`).join('');
      return `<div class="field"><label>${escapeHtml(f.label)}</label><select data-field="${f.name}">${opts}</select></div>`;
    }
    return `<div class="field"><label>${escapeHtml(f.label)}</label><input type="${f.type}" data-field="${f.name}" value="${escapeHtml(f.value||'')}" placeholder="${escapeHtml(f.placeholder||'')}"></div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="modal">
      <h3>${escapeHtml(title)}</h3>
      <form id="genericForm">${fieldsHtml}
        <div class="modal-actions">
          <button type="button" id="btnCancelModal">Huỷ</button>
          <button type="submit" class="primary">Lưu</button>
        </div>
      </form>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#btnCancelModal').addEventListener('click', ()=>overlay.remove());
  overlay.querySelector('#genericForm').addEventListener('submit', e=>{
    e.preventDefault();
    const values = {};
    fields.forEach(f=>{ values[f.name] = overlay.querySelector(`[data-field="${f.name}"]`).value; });
    onSubmit(values);
    overlay.remove();
  });
  const firstInput = overlay.querySelector('input,select');
  if(firstInput) firstInput.focus();
}

/* ===================== UTILS ===================== */
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ===================== INIT ===================== */
if(state.classes.length>0 && !state.currentClassId){
  state.currentClassId = state.classes[0].id;
}
renderAll();
